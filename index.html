<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhésion K2A Corporate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        :root { --primary: #0088cc; --bg: #f4f4f9; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .iti { width: 100%; } 
        .error { color: #d9534f; font-size: 0.8em; margin-top: 5px; display: none; }
        .cgu { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85em; margin-top: 20px; }
        .cgu input { width: auto; margin-top: 3px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #otherBrokerGroup { display: none; margin-top: 10px; }
        .file-info { font-size: 0.75em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 FORMULAIRE D'ADHÉSION</h2>
    <form id="adhForm">
        <div class="group">
            <label>Nom</label>
            <input type="text" id="nom" required placeholder="Ex: KOTCHIKPA">
        </div>
        <div class="group">
            <label>Prénom</label>
            <input type="text" id="prenom" required placeholder="Ex: Jean">
        </div>
        <div class="group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="nom@exemple.com">
        </div>
        
        <div class="group">
            <label>Téléphone (WhatsApp)</label>
            <input type="tel" id="tel" required>
        </div>

        <div class="group">
            <label>Date de Naissance</label>
            <input type="date" id="dob" required>
            <div id="ageError" class="error">⚠️ Vous devez avoir au moins 21 ans révolus pour adhérer.</div>
        </div>

        <div class="group">
            <label>Pièce d'Identité (Recto/Verso ou PDF)</label>
            <input type="file" id="idFile" accept="image/*,.pdf" required>
            <div class="file-info">Format accepté : Photo claire ou PDF. Obligatoire pour vérification.</div>
        </div>

        <div class="group">
            <label>Broker (Courtier)</label>
            <select id="broker" required onchange="toggleOtherBroker()">
                <option value="">-- Choisissez votre Broker --</option>
                <option value="Deriv">Deriv</option>
                <option value="Exness">Exness</option>
                <option value="Vantage">Vantage</option>
                <option value="Autre">Autre (Préciser)</option>
            </select>
            <div id="otherBrokerGroup">
                <input type="text" id="otherBrokerName" placeholder="Nom du broker...">
            </div>
        </div>
        <div class="group">
            <label>Numéro Compte Démo</label>
            <input type="number" id="demo" required placeholder="Ex: 1234567">
        </div>
        <div class="group">
            <label>Numéro Compte Réel</label>
            <input type="number" id="real" required placeholder="Ex: 8876543">
        </div>

        <div class="cgu">
            <input type="checkbox" id="cguCheck" required>
            <label for="cguCheck">Je confirme avoir lu et accepté les <a href="https://k2a-corporate.github.io/Documentations/Conditions%20G%C3%A9n%C3%A9rales%20d'Utilisation" target="_blank">Conditions Générales d'Utilisation</a> de K2A Corporate.</label>
        </div>

        <button type="submit" id="submitBtn" disabled>SOUMETTRE MON ADHÉSION</button>
    </form>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- INITIALISATION BIBLIOTHEQUE PAYS (SANS SAISIE MANUELLE DU CODE) ---
    const phoneInput = document.querySelector("#tel");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "auto",
        separateDialCode: true, // Affiche le code (+229, +33...) automatiquement devant le numéro
        geoIpLookup: callback => {
            fetch('https://ipapi.co/json/').then(res => res.json()).then(data => callback(data.country_code)).catch(() => callback("bj"));
        },
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    function toggleOtherBroker() {
        const brokerSelect = document.getElementById('broker');
        const otherGroup = document.getElementById('otherBrokerGroup');
        const otherInput = document.getElementById('otherBrokerName');
        
        if (brokerSelect.value === "Autre") {
            otherGroup.style.display = 'block';
            otherInput.required = true;
        } else {
            otherGroup.style.display = 'none';
            otherInput.required = false;
        }
    }

    function validateForm() {
        const dobValue = document.getElementById('dob').value;
        const cguChecked = document.getElementById('cguCheck').checked;
        const fileInput = document.getElementById('idFile');
        const submitBtn = document.getElementById('submitBtn');
        const ageError = document.getElementById('ageError');

        let isAdult = false;
        if (dobValue) {
            const birthDate = new Date(dobValue);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            isAdult = (age >= 21);
            ageError.style.display = isAdult ? 'none' : 'block';
        }

        const hasFile = fileInput.files.length > 0;
        submitBtn.disabled = !(isAdult && cguChecked && hasFile);
    }

    document.getElementById('dob').addEventListener('change', validateForm);
    document.getElementById('cguCheck').addEventListener('change', validateForm);
    document.getElementById('idFile').addEventListener('change', validateForm);

    document.getElementById('adhForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let finalBroker = document.getElementById('broker').value;
        if(finalBroker === "Autre") {
            finalBroker = document.getElementById('otherBrokerName').value;
        }

        const fullPhoneNumber = iti.getNumber(); // Récupère le numéro complet avec le code pays choisi
        const countryData = iti.getSelectedCountryData();

        const file = document.getElementById('idFile').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            const data = {
                tg_id: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "Inconnu",
                nom: document.getElementById('nom').value.toUpperCase(),
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                tel: fullPhoneNumber,
                pays: countryData.name,
                dob: document.getElementById('dob').value,
                broker: finalBroker,
                demo: document.getElementById('demo').value,
                real: document.getElementById('real').value,
                fileData: reader.result,
                fileName: file.name
            };

            fetch('https://hook.eu1.make.com/jdvaj34fg72docjmh2p6a4oguyb53ssk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(response => {
                if(response.ok) {
                    tg.showAlert("Inscription K2A envoyée avec succès !");
                    tg.close(); 
                }
            })
            .catch(error => {
                tg.showAlert("Erreur réseau. Veuillez réessayer.");
            });
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
