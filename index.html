<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhésion K2A Corporate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        :root { --primary: #0088cc; --bg: #f4f4f9; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; font-size: 1.4em; }
        .group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.85em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .iti { width: 100%; }
        .error { color: #d9534f; font-size: 0.75em; margin-top: 4px; display: none; }
        .cgu { display: flex; gap: 8px; font-size: 0.8em; margin-top: 15px; align-items: flex-start; }
        #manualCountryGroup, #otherBrokerGroup { display: none; background: #f0f7ff; padding: 10px; border-radius: 6px; margin-top: 5px; border-left: 3px solid var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 0.95em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 FORMULAIRE D'ADHÉSION</h2>
    <form id="adhForm">
        <div class="group"><label>Nom</label><input type="text" id="nom" required></div>
        <div class="group"><label>Prénom</label><input type="text" id="prenom" required></div>
        <div class="group"><label>Email</label><input type="email" id="email" required></div>
        
        <div class="group">
            <label>Téléphone (WhatsApp)</label>
            <input type="tel" id="tel" required>
            <p style="font-size: 0.7em; color: #666; margin-top: 2px;">Si votre pays n'est pas dans la liste, tapez le numéro complet avec +code.</p>
        </div>

        <div class="group">
            <label>Date de Naissance</label>
            <input type="date" id="dob" required>
            <div id="ageError" class="error">⚠️ Vous devez avoir 21 ans révolus à ce jour.</div>
        </div>

        <div class="group">
            <label>Broker</label>
            <select id="broker" required onchange="toggleOther('broker', 'otherBrokerGroup')">
                <option value="">-- Choisir --</option>
                <option value="Deriv">Deriv</option>
                <option value="Exness">Exness</option>
                <option value="Vantage">Vantage</option>
                <option value="Autre">Autre (Préciser)</option>
            </select>
            <div id="otherBrokerGroup"><input type="text" id="otherBrokerName" placeholder="Nom du broker..."></div>
        </div>

        <div class="group"><label>Compte Démo</label><input type="number" id="demo" required></div>
        <div class="group"><label>Compte Réel</label><input type="number" id="real" required></div>

        <div class="cgu">
            <input type="checkbox" id="cguCheck" required>
            <label>Je confirme avoir lu et accepté les <a href="https://k2a-corporate.github.io/Documentations/Conditions%20G%C3%A9n%C3%A9rales%20d'Utilisation" target="_blank">CGU</a> de K2A Corporate.</label>
        </div>

        <button type="submit" id="submitBtn" disabled>SOUMETTRE MON ADHÉSION</button>
    </form>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Configuration de la bibliothèque de pays/téléphone
    const phoneInput = document.querySelector("#tel");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "auto",
        separateDialCode: true, // Affiche le +code à côté du drapeau
        geoIpLookup: callback => {
            fetch('https://ipapi.co/json/').then(res => res.json()).then(data => callback(data.country_code)).catch(() => callback("bj"));
        },
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    function toggleOther(selectId, targetId) {
        const val = document.getElementById(selectId).value;
        document.getElementById(targetId).style.display = (val === "Autre") ? 'block' : 'none';
    }

    function validate() {
        const dob = document.getElementById('dob').value;
        const cgu = document.getElementById('cguCheck').checked;
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('ageError');

        if(!dob) { btn.disabled = true; return; }

        const birth = new Date(dob);
        const today = new Date();
        let age = today.getFullYear() - birth.getFullYear();
        if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;

        const isAdult = (age >= 21);
        err.style.display = isAdult ? 'none' : 'block';
        btn.disabled = !(isAdult && cgu);
    }

    document.getElementById('dob').addEventListener('change', validate);
    document.getElementById('cguCheck').addEventListener('change', validate);

    document.getElementById('adhForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Récupération des données finales
        const countryData = iti.getSelectedCountryData();
        const fullNumber = iti.getNumber();
        
        const data = {
            tg_id: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "Inconnu",
            nom: document.getElementById('nom').value.toUpperCase(),
            prenom: document.getElementById('prenom').value,
            email: document.getElementById('email').value,
            tel: fullNumber,
            pays: countryData.name || "Inconnu",
            dob: document.getElementById('dob').value,
            broker: document.getElementById('broker').value === "Autre" ? document.getElementById('otherBrokerName').value : document.getElementById('broker').value,
            demo: document.getElementById('demo').value,
            real: document.getElementById('real').value
        };

        fetch('https://hook.eu1.make.com/jdvaj34fg72docjmh2p6a4oguyb53ssk', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => { 
            tg.showAlert("✅ Adhésion K2A transmise !"); 
            tg.close(); 
        }).catch(() => tg.showAlert("❌ Erreur d'envoi."));
    });
</script>
</body>
</html>
